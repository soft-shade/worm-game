<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Browser-tab icon for Worm Game.
      - Pink (#f38ba8) ring around the outside, with dark-grey radial
        rib bands across it at 30 degree intervals so the ring reads as
        a worm body wrapping the letters.
      - Two green (#a6e3a1) letters W and G in a chunky display font
        (Fredoka with rounded fallbacks for systems that don't have it).
      - W and G are placed so the line connecting their centres runs
        through the centre of the ring (32,32) at ~30 degrees down-right
        (dx 16, dy 9 -> atan = 29.4 degrees), which puts top-left of W
        and bottom-right of G symmetric about the centre.
  -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#f38ba8" stroke-width="6" />
  <g stroke="#1e1e2e" stroke-width="0.9" stroke-linecap="round" opacity="0.45">
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(15)"  />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(45)"  />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(75)"  />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(105)" />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(135)" />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(165)" />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(195)" />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(225)" />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(255)" />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(285)" />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(315)" />
    <line x1="0" y1="-30" x2="0" y2="-24" transform="translate(32,32) rotate(345)" />
  </g>
  <!--
    Position by alphabetic baseline (default), with y nudged down by
    half the cap-height so the *visible* glyph centres line up. For
    font-size 26 with cap-height ~0.72em, half-cap-height ~9.4 px:
        W visible centre (24, 27.5)  →  baseline y = 27.5 + 9.4 = 36.9
        G visible centre (40, 36.5)  →  baseline y = 36.5 + 9.4 = 45.9
  -->
  <text x="24" y="36.9" font-family="Fredoka, 'Comic Sans MS', 'Avenir Next Rounded', sans-serif"
        font-weight="700" font-size="26" fill="#a6e3a1"
        text-anchor="middle">W</text>
  <text x="40" y="45.9" font-family="Fredoka, 'Comic Sans MS', 'Avenir Next Rounded', sans-serif"
        font-weight="700" font-size="26" fill="#a6e3a1"
        text-anchor="middle">G</text>
</svg>
