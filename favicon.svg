<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Browser-tab icon for Worm Game.
      - Pink (#f38ba8) "wormy" ring around the outside, drawn as a
        rounded-cap dashed circle so each segment reads as a tiny
        capsule, echoing the worms in the in-game stats bars.
      - Two green (#a6e3a1) letters W and G in a chunky display
        font. We name Fredoka first (the title font in the stats
        modal); browsers without it fall back to a friendly
        rounded-ish system font.
      - The G sits down-right of the W along a ~30 degree slope
        (dx 16, dy 9 -> atan = 29.4 degrees).
  -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#f38ba8"
          stroke-width="6" stroke-dasharray="7 1.6" stroke-linecap="round" />
  <text x="24" y="26" font-family="Fredoka, 'Comic Sans MS', 'Avenir Next Rounded', sans-serif"
        font-weight="700" font-size="26" fill="#a6e3a1"
        text-anchor="middle" dominant-baseline="central">W</text>
  <text x="40" y="35" font-family="Fredoka, 'Comic Sans MS', 'Avenir Next Rounded', sans-serif"
        font-weight="700" font-size="26" fill="#a6e3a1"
        text-anchor="middle" dominant-baseline="central">G</text>
</svg>
