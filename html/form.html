<!DOCTYPE html>
<html>
    <head>
        <style>
            #input-form {
                padding: 0px;
            }
            #input-form input {
                padding: 6px 12px;
                font-size: 24px;
                width: 280px;
                box-sizing: border-box;
                caret-color: #cdd6f4;
                font-family: 'Inter', sans-serif;
                color: #cdd6f4;
                text-align: center;
                background: transparent;
                border: 1.5px solid rgba(108, 112, 134, 0.35);
                border-radius: 8px;
                outline: none;
                text-transform: uppercase;
                transition: border-color 0.15s ease;
            }
            #input-form input:focus {
                border-color: rgba(108, 112, 134, 0.95);
            }
            ::placeholder {
                color: #6c7086;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="input-form">
            <input type="text" name="input_word" placeholder="input word" maxlength="20" autocomplete="off" spellcheck="false"/>
        </div>
    </body>
</html>
