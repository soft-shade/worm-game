  measurementId: "G-6NGQQXZ01X"

};


      try {
        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

          auth, db,
          provider: new GoogleAuthProvider(),
          signInWithPopup, signOut, onAuthStateChanged,
          doc, getDoc, setDoc,
